<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flowers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;1,900&display=swap');
        * { font-family: 'Poppins', cursive; }
        body {
            color: azure;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: black;
            margin: 0;
            overflow: hidden;
        }
        .greetings { font-size: 6rem; font-weight: 900; }
        .greetings > span { animation: glow 2.5s ease-in-out infinite; }
        @keyframes glow {
            0%, 100% { color: #fff; text-shadow: 0 0 12px #39c6d6, 0 0 50px #39c6d6, 0 0 100px #39c6d6; }
            10%, 90%  { color: #111; text-shadow: none; }
        }
        .greetings > span:nth-child(2) { animation-delay: .2s; }
        .greetings > span:nth-child(3) { animation-delay: .4s; }
        .greetings > span:nth-child(4) { animation-delay: .6s; }
        .greetings > span:nth-child(5) { animation-delay: .8s; }
        .description { font-size: 1.5rem; margin-bottom: 20px; }
        .button a { text-decoration: none; font-size: 1rem; color: #111; }
        
        @media screen and (max-width: 600px) {
            .greetings { display: block; font-size: 3rem; font-weight: 500; text-align: center; }
            .description { font-size: 1.2rem; margin-bottom: 25px; }
            .button a { 
                font-size: 1.2rem; 
                padding: 12px 25px; 
                border: 2px solid azure; 
                border-radius: 30px; 
                background: rgba(255, 255, 255, 0.1); 
                color: azure; 
                display: inline-block;
            }
        }
    </style>
</head>
<body>
    <div class="greetings">
        <span>H</span><span>A</span><span>L</span><span>L</span><span>O</span>
    </div>
    <div class="description">
        Maafin aku ya sayang...
    </div>
    <div class="button">
        <a href="flower.html">Buka pesannya di sini ya...</a>
    </div>
</body>
</html>
